<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAMpionship</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a1a; color: #e0e0e0; min-height: 100vh; }

header { background: linear-gradient(135deg, #2d1b4e, #1a0a2e); padding: 16px; text-align: center; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid #7b3fa0; }
header h1 { font-size: 24px; color: #c084fc; letter-spacing: 2px; }
header .subtitle { font-size: 12px; color: #888; margin-top: 4px; }

.back-btn { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #c084fc; font-size: 20px; cursor: pointer; padding: 8px; }

#app { max-width: 600px; margin: 0 auto; padding: 8px; position: relative; }

/* Leaderboard */
.leaderboard-row { display: flex; align-items: center; padding: 12px 16px; margin: 4px 0; background: #1a1a2e; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
.leaderboard-row:hover { background: #2a2a3e; }
.leaderboard-row.top-1 { background: linear-gradient(135deg, #2d2a10, #1a1a2e); border-left: 3px solid #ffd700; }
.leaderboard-row.top-2 { background: linear-gradient(135deg, #2a2a2a, #1a1a2e); border-left: 3px solid #c0c0c0; }
.leaderboard-row.top-3 { background: linear-gradient(135deg, #2d1a10, #1a1a2e); border-left: 3px solid #cd7f32; }
.rank { width: 36px; font-weight: 700; font-size: 16px; color: #888; }
.top-1 .rank { color: #ffd700; }
.top-2 .rank { color: #c0c0c0; }
.top-3 .rank { color: #cd7f32; }
.avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; margin-right: 10px; background: #2a2a3e; flex-shrink: 0; }
.avatar-large { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; margin: 0 auto 8px; display: block; background: #2a2a3e; }
.user-name { flex: 1; font-size: 15px; }
.user-points { font-weight: 700; font-size: 16px; color: #c084fc; }
.user-delta { font-size: 11px; color: #4ade80; margin-left: 6px; opacity: 0.8; }
.user-movement { font-size: 11px; margin-right: 4px; min-width: 28px; text-align: center; }
.user-movement.up { color: #4ade80; }
.user-movement.down { color: #f87171; }
.user-movement.same { color: #666; }

/* Squad view */
.squad-header { text-align: center; padding: 20px 16px; }
.squad-header h2 { font-size: 22px; color: #fff; }
.squad-header h2 .squad-header-rank { color: #c084fc; font-weight: 700; margin-right: 4px; }
.squad-header .total { font-size: 28px; color: #c084fc; font-weight: 700; margin-top: 4px; }
.squad-header .total span { font-size: 14px; color: #888; }

.player-row { display: flex; align-items: center; padding: 12px 16px; margin: 4px 0; background: #1a1a2e; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
.player-row:hover { background: #2a2a3e; }
.player-name { flex: 1; font-size: 15px; }
.player-price { font-size: 12px; color: #888; margin-right: 12px; }
.player-points { font-weight: 700; font-size: 16px; color: #c084fc; }

/* Breakdown view */
.breakdown-header { text-align: center; padding: 20px 16px; }
.breakdown-header h2 { font-size: 20px; color: #fff; }
.breakdown-header .total { font-size: 24px; color: #c084fc; font-weight: 700; margin-top: 4px; }

.match-card { background: #1a1a2e; border-radius: 8px; margin: 8px 0; overflow: hidden; }
.match-card-header { padding: 12px 16px; background: #2a2a3e; display: flex; justify-content: space-between; align-items: center; }
.match-teams { font-size: 14px; }
.match-teams .tam { color: #c084fc; font-weight: 600; }
.match-score-badge { background: #3a2a5e; padding: 4px 10px; border-radius: 4px; font-weight: 700; font-size: 14px; }
.match-score-badge.win { background: #1a4a2e; color: #4ade80; }
.match-score-badge.loss { background: #4a1a1a; color: #f87171; }

.partij-row { padding: 8px 16px; border-top: 1px solid #2a2a3e; display: flex; align-items: center; gap: 8px; font-size: 13px; }
.partij-type { width: 36px; font-weight: 600; color: #888; }
.partij-detail { flex: 1; }
.partij-sets { color: #aaa; font-family: monospace; }
.partij-points { font-weight: 700; min-width: 40px; text-align: right; }
.partij-points.win { color: #4ade80; }
.partij-points.straight { color: #4ade80; }
.partij-points.partial { color: #facc15; }
.partij-points.wo { color: #60a5fa; }
.partij-points.loss { color: #666; }
.partij-rating { font-size: 10px; color: #888; font-family: monospace; }
.partij-bonuses { font-size: 10px; color: #facc15; margin-top: 2px; }

.team-bonus { padding: 8px 16px; border-top: 1px solid #2a2a3e; font-size: 13px; color: #4ade80; text-align: right; }

.match-total { padding: 8px 16px; border-top: 2px solid #3a3a5e; display: flex; justify-content: space-between; font-weight: 700; font-size: 14px; }
.match-total .pts { color: #c084fc; }

.no-matches { text-align: center; padding: 40px; color: #666; }

.match-card.dimmed { opacity: 0.4; }
.match-card.dimmed .match-card-header::after { content: 'niet geteld'; font-size: 10px; color: #f87171; margin-left: 8px; }

.weekend-label { padding: 12px 16px 4px; font-size: 12px; color: #c084fc; text-transform: uppercase; letter-spacing: 1px; border-top: 1px solid #2a2a3e; margin-top: 12px; }

.rank-timeline { display: flex; flex-wrap: wrap; gap: 6px; margin: 4px 0 16px; padding: 0 16px; }
.rank-timeline-label { flex-basis: 100%; font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
.rank-pill { display: inline-flex; flex-direction: column; align-items: center; padding: 6px 10px; background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 8px; min-width: 52px; }
.rank-pill .rank-pill-date { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
.rank-pill .rank-pill-rank { font-size: 14px; font-weight: 700; color: #c084fc; margin-top: 2px; line-height: 1; }
.rank-pill .rank-pill-delta { font-size: 10px; margin-top: 2px; line-height: 1; }
.rank-pill .delta-up { color: #4ade80; }
.rank-pill .delta-down { color: #f87171; }
.rank-pill .delta-flat { color: #555; }

.rating-chart-container { margin: 12px 0 16px; background: #1a1a2e; border-radius: 12px; padding: 16px 12px 12px; border: 1px solid #2a2a3e; }
.rating-chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.rating-chart-header h3 { font-size: 13px; color: #c084fc; letter-spacing: 1px; text-transform: uppercase; margin: 0; }
.rating-tabs { display: flex; gap: 4px; }
.rating-tab { background: #2a2a3e; border: 1px solid #3a3a5e; color: #888; font-size: 11px; padding: 4px 12px; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
.rating-tab.active { background: #3a2a5e; border-color: #7b3fa0; color: #c084fc; }
.rating-chart-container canvas { width: 100%; height: 180px; display: block; }

.section-label { padding: 12px 16px 4px; font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 1px; }

/* Mini leaderboards */
.mini-boards { display: flex; flex-direction: column; gap: 8px; position: fixed; left: calc(75% + 110px); top: 120px; width: 180px; z-index: 5; transform: translateX(-50%); }
.mini-board { background: #1a1a2e; border-radius: 8px; padding: 10px 12px; }
.mini-board h4 { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.mini-entry { display: flex; align-items: center; padding: 3px 0; font-size: 12px; }
.mini-entry .mini-medal { width: 18px; font-size: 13px; }
.mini-entry .mini-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mini-entry .mini-value { color: #c084fc; font-weight: 600; font-size: 11px; margin-left: 4px; }
/* Mobile: hide sidebar, show hamburger */
.hamburger { display: none; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #c084fc; font-size: 22px; cursor: pointer; padding: 8px; }
.mobile-drawer { display: none; position: fixed; inset: 0; z-index: 50; }
.mobile-drawer.open { display: flex; }
.mobile-drawer-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); }
.mobile-drawer-content { position: relative; background: #1a1a2e; width: 260px; height: 100%; padding: 60px 16px 16px; overflow-y: auto; }
.mobile-drawer-close { position: absolute; top: 12px; right: 12px; background: none; border: none; color: #888; font-size: 24px; cursor: pointer; }
@media (max-width: 1000px) {
  .mini-boards { display: none !important; }
  .hamburger { display: block; }
}

/* Login button in header */
.login-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: #3a2a5e; border: 1px solid #7b3fa0; color: #c084fc; font-size: 12px; cursor: pointer; padding: 6px 12px; border-radius: 6px; }
.login-btn:hover { background: #4a3a6e; }
.logged-in-badge { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); display: flex; align-items: center; gap: 6px; }
.logged-in-badge img { width: 28px; height: 28px; border-radius: 50%; }
.logged-in-badge span { font-size: 11px; color: #888; }
.logout-btn { background: none; border: none; color: #666; font-size: 10px; cursor: pointer; text-decoration: underline; }

/* Rules button */
.rules-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: 1px solid #3a3a5e; color: #888; font-size: 11px; cursor: pointer; padding: 4px 10px; border-radius: 6px; }
.rules-btn:hover { color: #c084fc; border-color: #7b3fa0; }
.rules-content { padding: 0 4px; }
.rules-content h4 { color: #c084fc; margin: 12px 0 6px; font-size: 14px; }
.rules-content table { width: 100%; border-collapse: collapse; font-size: 13px; }
.rules-content td { padding: 4px 8px; border-bottom: 1px solid #2a2a3e; }
.rules-content td:last-child { text-align: right; color: #c084fc; font-weight: 600; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: center; justify-content: center; }
.modal { background: #1a1a2e; border-radius: 12px; padding: 24px; max-width: 400px; width: 90%; }
.modal h3 { color: #c084fc; margin-bottom: 16px; text-align: center; }
.modal input[type="email"], .modal input[type="text"] { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #3a3a5e; background: #0a0a1a; color: #e0e0e0; font-size: 16px; margin-bottom: 12px; }
.modal input::placeholder { color: #555; }
.modal-btn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #7b3fa0; color: #fff; font-size: 16px; cursor: pointer; font-weight: 600; }
.modal-btn:hover { background: #9b5fc0; }
.modal-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.modal-error { color: #f87171; font-size: 13px; text-align: center; margin-top: 8px; }
.modal-info { color: #888; font-size: 12px; text-align: center; margin-top: 8px; }

/* Wildcard editor */
.wildcard-btn { display: block; margin: 16px auto; padding: 10px 20px; background: #7b3fa0; border: none; border-radius: 8px; color: #fff; font-size: 14px; cursor: pointer; font-weight: 600; }
.wildcard-btn:hover { background: #9b5fc0; }
.wildcard-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.wildcard-used { text-align: center; color: #666; font-size: 12px; padding: 8px; }

.editor-search { width: 100%; padding: 10px 16px; border-radius: 8px; border: 1px solid #3a3a5e; background: #0a0a1a; color: #e0e0e0; font-size: 14px; margin: 8px 0; }
.editor-filters { display: flex; gap: 6px; padding: 4px 0; flex-wrap: wrap; }
.filter-chip { padding: 4px 10px; border-radius: 12px; border: 1px solid #3a3a5e; background: #0a0a1a; color: #888; font-size: 12px; cursor: pointer; }
.filter-chip.active { background: #3a2a5e; color: #c084fc; border-color: #7b3fa0; }

.editor-budget { text-align: center; padding: 12px; font-size: 16px; font-weight: 700; }
.editor-budget.over { color: #f87171; }
.editor-budget.ok { color: #4ade80; }

.editor-player { display: flex; align-items: center; padding: 10px 16px; margin: 3px 0; background: #1a1a2e; border-radius: 8px; cursor: pointer; }
.editor-player:hover { background: #2a2a3e; }
.editor-player.selected { background: #2a1a4e; border: 1px solid #7b3fa0; }
.editor-player.disabled { opacity: 0.3; pointer-events: none; }
.editor-player .ep-name { flex: 1; font-size: 14px; }
.editor-player .ep-price { font-size: 13px; color: #888; }
.editor-player .ep-check { width: 20px; color: #c084fc; font-weight: 700; }

.confirm-bar { position: sticky; bottom: 0; background: #1a1a2e; border-top: 2px solid #3a3a5e; padding: 12px; display: flex; gap: 8px; }
.confirm-bar button { flex: 1; padding: 12px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
.confirm-bar .cancel { background: #2a2a3e; color: #888; }
.confirm-bar .confirm { background: #7b3fa0; color: #fff; }
.confirm-bar .confirm:disabled { opacity: 0.5; cursor: not-allowed; }
</style>

<body>

<header id="header">
  <h1>TAMpionship</h1>
  <div class="subtitle">KNLTB voorjaar Tennis 2026</div>
</header>

<div id="app"></div>
<div id="modal-root"></div>

<script>
const WORKER_URL = 'https://tampionship.tam-floris.workers.dev';
const BUDGET_MAX = 800;

let squads, players, matches, wildcardData = [];
let ratingHistory = {};
let playerPointsMap = {};
let currentView = 'leaderboard';
let currentUser = null;
let currentPlayer = null;

// Auth state
function getLoggedInEmail() { return localStorage.getItem('tamp_email'); }
function getLoggedInUser() {
  const email = getLoggedInEmail();
  if (!email) return null;
  return squads?.find(u => u.email && u.email.toLowerCase() === email.toLowerCase());
}
function isLoggedIn() { return localStorage.getItem('tamp_auth') === 'ok' && getLoggedInEmail(); }
function logout() { localStorage.removeItem('tamp_auth'); localStorage.removeItem('tamp_email'); render(); }

async function loadData() {
  [squads, players, matches, ratingHistory] = await Promise.all([
    fetch('tampionship_squads.json').then(r => r.json()),
    fetch('tampionship_players.json').then(r => r.json()),
    fetch('knltb_matches.json').then(r => r.json()),
    fetch('rating_history.json').then(r => r.json()).catch(() => ({})),
  ]);
  // Load and apply wildcards
  try {
    wildcardData = await fetch(WORKER_URL + '/wildcards').then(r => r.json());
    applyWildcards();
  } catch(e) { console.warn('Could not load wildcards:', e); }
  processMatches();
  render();
}

function getNextSaturdayKey(timestamp) {
  // Given a timestamp (Tue-Fri), return the weekend key of the NEXT Saturday
  const d = new Date(timestamp);
  const dow = d.getDay(); // 0=Sun..6=Sat
  const daysUntilSat = (6 - dow + 7) % 7 || 7; // always next Sat, not today
  const sat = new Date(d);
  sat.setDate(d.getDate() + daysUntilSat);
  const mm = String(sat.getMonth()+1).padStart(2,'0');
  const dd = String(sat.getDate()).padStart(2,'0');
  return `${sat.getFullYear()}-${mm}-${dd}`;
}

function applyWildcards() {
  for (const wc of wildcardData) {
    const user = squads.find(u => u.email && u.email.toLowerCase() === wc.email);
    if (user) {
      user.wildcardUsed = true;
      user.wildcardDate = wc.timestamp;
      user.oldSquad = wc.oldSquad || user.squad;
      user.squad = wc.newSquad;
      // Effective from the next Saturday after the wildcard was used
      user.wildcardWeekendKey = getNextSaturdayKey(wc.timestamp);
    }
  }
}

function getPlayerPointsUpToWeekend(pName, beforeWeekendKey) {
  // Get points for a player from weekends strictly before the given key
  const pd = playerPointsMap[pName];
  if (!pd) return 0;
  return pd.matchDetails
    .filter(md => md.counted && md.weekendKey && md.weekendKey < beforeWeekendKey)
    .reduce((s, md) => s + md.matchTotal, 0);
}

function getPlayerPointsFromWeekend(pName, fromWeekendKey) {
  // Get points for a player from weekends >= the given key
  const pd = playerPointsMap[pName];
  if (!pd) return 0;
  return pd.matchDetails
    .filter(md => md.counted && md.weekendKey && md.weekendKey >= fromWeekendKey)
    .reduce((s, md) => s + md.matchTotal, 0);
}

function getUserPointsThroughWeekend(user, wkInclusive) {
  // Total squad points for a user through (and including) the given weekend.
  // Mirrors the wildcard logic in calculateLeaderboard().
  if (user.wildcardUsed && user.wildcardWeekendKey) {
    const wcWk = user.wildcardWeekendKey;
    const oldPts = (user.oldSquad || []).reduce((sum, pName) => {
      const pd = playerPointsMap[pName];
      if (!pd) return sum;
      return sum + pd.matchDetails
        .filter(md => md.counted && md.weekendKey && md.weekendKey < wcWk && md.weekendKey <= wkInclusive)
        .reduce((s, md) => s + md.matchTotal, 0);
    }, 0);
    const newPts = (user.squad || []).reduce((sum, pName) => {
      const pd = playerPointsMap[pName];
      if (!pd) return sum;
      return sum + pd.matchDetails
        .filter(md => md.counted && md.weekendKey && md.weekendKey >= wcWk && md.weekendKey <= wkInclusive)
        .reduce((s, md) => s + md.matchTotal, 0);
    }, 0);
    return oldPts + newPts;
  }
  return (user.squad || []).reduce((sum, pName) => {
    const pd = playerPointsMap[pName];
    if (!pd) return sum;
    return sum + pd.matchDetails
      .filter(md => md.counted && md.weekendKey && md.weekendKey <= wkInclusive)
      .reduce((s, md) => s + md.matchTotal, 0);
  }, 0);
}

function getUserRankPerWeekend(userName) {
  // Returns [{weekendKey, rank, points}] for every played weekend, asc by date.
  const weekends = getAllWeekendKeys();
  const users = squads.filter(u => !u.user.match(/\(\d+\)$/));
  const history = [];
  for (const wk of weekends) {
    const ptsList = users.map(u => ({ user: u.user, points: getUserPointsThroughWeekend(u, wk) }));
    ptsList.sort((a, b) => b.points - a.points);
    const idx = ptsList.findIndex(e => e.user === userName);
    if (idx === -1) continue;
    history.push({ weekendKey: wk, rank: idx + 1, points: ptsList[idx].points });
  }
  return history;
}

function isPlayed(m) {
  return /^\d+\s*[–-]\s*\d+$/.test(m.team_score);
}

function parseTeamScore(score) {
  const parts = score.split(/[–-]/).map(s => parseInt(s.trim()));
  return { home: parts[0], away: parts[1] };
}

function parseDate(dateStr) {
  // Parse "6-4-2026" -> Date object
  if (!dateStr) return null;
  const [d, m, y] = dateStr.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function getWeekendKey(dateStr) {
  // Group Sat-Mon into same weekend. Key = the Saturday date.
  const d = parseDate(dateStr);
  if (!d) return '';
  const dow = d.getDay(); // 0=Sun, 1=Mon, 6=Sat
  const sat = new Date(d);
  if (dow === 0) sat.setDate(d.getDate() - 1);      // Sun -> prev Sat
  else if (dow === 1) sat.setDate(d.getDate() - 2);  // Mon -> prev Sat
  // else it's already Sat (or another day, just use as-is)
  const mm = String(sat.getMonth()+1).padStart(2,'0');
  const dd = String(sat.getDate()).padStart(2,'0');
  return `${sat.getFullYear()}-${mm}-${dd}`;
}

function processMatches() {
  const playerNames = new Set(players.map(p => p.name));
  playerPointsMap = {};

  for (const name of playerNames) {
    playerPointsMap[name] = { totalPoints: 0, matchDetails: [] };
  }

  const playedMatches = matches.filter(isPlayed);

  // First pass: compute points per player per match
  const playerMatchResults = {}; // playerName -> [{matchTotal, weekendKey, date, detail}]

  for (const match of playedMatches) {
    const ts = parseTeamScore(match.team_score);
    const homeWon = ts.home > ts.away;
    const homeTam = match.home_team.startsWith('TAM');
    const awayTam = match.away_team.startsWith('TAM');
    const weekendKey = getWeekendKey(match.date);

    const playerMatchData = {};

    for (const partij of match.partijen) {
      const sides = [
        { data: partij.home, side: 'home', isWinner: partij.home.won, isTam: homeTam },
        { data: partij.away, side: 'away', isWinner: partij.away.won, isTam: awayTam },
      ];

      for (const { data, side, isWinner, isTam } of sides) {
        if (!isTam || !data.players || data.players.length === 0) continue;

        for (const pName of data.players) {
          if (!playerNames.has(pName)) continue;

          const oppSide = side === 'home' ? partij.away : partij.home;
          let breakdown = {};

          if (partij.sets.length === 0) {
            // Walkover
            breakdown = { matchWin: isWinner ? 15 : 0, setsWon: 0, gamesWon: 0, tiebreaks: 0, straightSets: 0, comeback: 0, upset: 0 };
          } else {
            // Detect match tiebreak: 3rd set where either score > 7 (e.g. 10-8, 7-10)
            const isMatchTiebreak = (s) => s[0] > 7 || s[1] > 7;

            // Count sets won (match tiebreak counts as 1 set)
            const mySetsWon = partij.sets.filter(s => side === 'home' ? s[0] > s[1] : s[1] > s[0]).length;

            // Count games won — exclude match tiebreak (not real games)
            const myGamesWon = partij.sets
              .filter(s => !isMatchTiebreak(s))
              .reduce((sum, s) => sum + (side === 'home' ? s[0] : s[1]), 0);

            // Tiebreak: regular 7-6 set OR winning the match tiebreak
            const regularTiebreaksWon = partij.sets.filter(s => {
              if (isMatchTiebreak(s)) return false;
              const my = side === 'home' ? s[0] : s[1];
              const opp = side === 'home' ? s[1] : s[0];
              return my === 7 && opp === 6;
            }).length;
            const matchTiebreakWon = partij.sets.filter(s => {
              if (!isMatchTiebreak(s)) return false;
              const my = side === 'home' ? s[0] : s[1];
              const opp = side === 'home' ? s[1] : s[0];
              return my > opp;
            }).length;
            const tiebreaksWon = regularTiebreaksWon + matchTiebreakWon;

            // Straight sets: won without losing a set
            const setsLost = partij.sets.filter(s => side === 'home' ? s[1] > s[0] : s[0] > s[1]).length;
            const straightSets = isWinner && setsLost === 0;

            // Comeback: lost first set but won the match
            const firstSetLost = partij.sets.length > 0 && (side === 'home' ? partij.sets[0][1] > partij.sets[0][0] : partij.sets[0][0] > partij.sets[0][1]);
            const comebackWin = isWinner && firstSetLost;

            // Upset: beat a better-rated opponent (lower number = better)
            const myRatings = data.ratings?.filter(r => r != null) || [];
            const oppRatings = oppSide.ratings?.filter(r => r != null) || [];
            let isUpset = false;
            if (isWinner && myRatings.length > 0 && oppRatings.length > 0) {
              const myAvg = myRatings.reduce((a, b) => a + b, 0) / myRatings.length;
              const oppAvg = oppRatings.reduce((a, b) => a + b, 0) / oppRatings.length;
              isUpset = myAvg > oppAvg; // my rating is worse (higher) = upset
            }

            breakdown = {
              matchWin: isWinner ? 15 : 0,
              setsWon: mySetsWon * 5,
              gamesWon: myGamesWon * 2,
              tiebreaks: tiebreaksWon * 3,
              straightSets: straightSets ? 15 : 0,
              comeback: comebackWin ? 10 : 0,
              upset: isUpset ? 10 : 0,
            };
          }

          const pts = Object.values(breakdown).reduce((a, b) => a + b, 0);

          if (!playerMatchData[pName]) {
            playerMatchData[pName] = { side, partijen: [], teamWinBonus: false };
          }
          const myIndex = data.players.indexOf(pName);
          const myRating = (data.ratings && myIndex >= 0) ? data.ratings[myIndex] : null;
          playerMatchData[pName].partijen.push({
            type: partij.type, sets: partij.sets, setScores: partij.set_scores,
            won: isWinner, points: pts, breakdown,
            reason: isWinner ? (breakdown.straightSets ? 'straight' : 'win') : (breakdown.setsWon > 0 ? 'partial' : 'loss'),
            myRatings: data.ratings || [],
            myRating,
            oppRatings: oppSide.ratings || [],
            opponent: oppSide,
            partner: data.players.length > 1 ? data.players.filter(n => n !== pName) : [],
          });
        }
      }
    }

    for (const [pName, pd] of Object.entries(playerMatchData)) {
      const playerOnHomeSide = pd.side === 'home';
      const playerTeamWon = (playerOnHomeSide && homeWon) || (!playerOnHomeSide && !homeWon);
      pd.teamWinBonus = playerTeamWon;

      const partijPts = pd.partijen.reduce((s, p) => s + p.points, 0);
      const bonusPts = pd.teamWinBonus ? 40 : 0;
      const matchTotal = partijPts + bonusPts;

      const detail = {
        homeTeam: match.home_team, awayTeam: match.away_team,
        teamScore: match.team_score, round: match.round, league: match.league,
        date: match.date, weekendKey,
        partijen: pd.partijen, teamWinBonus: pd.teamWinBonus,
        matchTotal, counted: true,
      };

      if (!playerMatchResults[pName]) playerMatchResults[pName] = [];
      playerMatchResults[pName].push(detail);
    }
  }

  // Second pass: for each player, per weekend, only count the best match
  for (const [pName, matchList] of Object.entries(playerMatchResults)) {
    // Group by weekend
    const byWeekend = {};
    for (const md of matchList) {
      const key = md.weekendKey || md.date || 'unknown';
      if (!byWeekend[key]) byWeekend[key] = [];
      byWeekend[key].push(md);
    }

    // For each weekend with multiple matches, only count the first matchday
    for (const [wk, wkMatches] of Object.entries(byWeekend)) {
      if (wkMatches.length > 1) {
        wkMatches.sort((a, b) => (a.date || '').localeCompare(b.date || ''));
        const firstDate = wkMatches[0].date;
        for (let i = 1; i < wkMatches.length; i++) {
          if (wkMatches[i].date !== firstDate) {
            wkMatches[i].counted = false;
          }
        }
      }
    }

    // Accumulate only counted matches
    if (!playerPointsMap[pName]) continue;
    playerPointsMap[pName].matchDetails = matchList;
    playerPointsMap[pName].totalPoints = matchList
      .filter(md => md.counted)
      .reduce((s, md) => s + md.matchTotal, 0);
  }
}

function getAllWeekendKeys() {
  const keys = new Set();
  for (const pd of Object.values(playerPointsMap)) {
    for (const md of pd.matchDetails) {
      if (md.counted && md.weekendKey) keys.add(md.weekendKey);
    }
  }
  return Array.from(keys).sort();
}

function getLastWeekendKey() {
  let latest = '';
  for (const pd of Object.values(playerPointsMap)) {
    for (const md of pd.matchDetails) {
      if (md.counted && md.weekendKey && md.weekendKey > latest) {
        latest = md.weekendKey;
      }
    }
  }
  return latest;
}

function getPlayerLastWeekendPts(pName, lastWk) {
  const pd = playerPointsMap[pName];
  if (!pd) return 0;
  return pd.matchDetails
    .filter(md => md.counted && md.weekendKey === lastWk)
    .reduce((s, md) => s + md.matchTotal, 0);
}

function getPlayerPtsExcludingWeekend(pName, excludeWk) {
  const pd = playerPointsMap[pName];
  if (!pd) return 0;
  return pd.matchDetails
    .filter(md => md.counted && md.weekendKey !== excludeWk)
    .reduce((s, md) => s + md.matchTotal, 0);
}

function calculateLeaderboard() {
  const lastWk = getLastWeekendKey();
  const filtered = squads.filter(u => !u.user.match(/\(\d+\)$/));

  // Current standings — handle wildcard point splits
  const current = filtered.map(u => {
    let pts, lastWkPts;
    if (u.wildcardUsed && u.wildcardWeekendKey) {
      const wcWk = u.wildcardWeekendKey;
      // Old squad: count points from before wildcard weekend
      const oldPts = (u.oldSquad || []).reduce((sum, pName) =>
        sum + getPlayerPointsUpToWeekend(pName, wcWk), 0);
      // New squad: count points from wildcard weekend onwards
      const newPts = (u.squad || []).reduce((sum, pName) =>
        sum + getPlayerPointsFromWeekend(pName, wcWk), 0);
      pts = oldPts + newPts;
      // Last weekend delta uses new squad only
      lastWkPts = (u.squad || []).reduce((sum, pName) => sum + getPlayerLastWeekendPts(pName, lastWk), 0);
    } else {
      pts = (u.squad || []).reduce((sum, pName) => sum + (playerPointsMap[pName]?.totalPoints || 0), 0);
      lastWkPts = (u.squad || []).reduce((sum, pName) => sum + getPlayerLastWeekendPts(pName, lastWk), 0);
    }
    return { ...u, totalPoints: pts, lastWeekendPts: lastWkPts };
  });

  // Previous standings (before last weekend)
  const previous = filtered.map(u => {
    let pts;
    if (u.wildcardUsed && u.wildcardWeekendKey) {
      const wcWk = u.wildcardWeekendKey;
      const oldPts = (u.oldSquad || []).reduce((sum, pName) =>
        sum + getPlayerPointsUpToWeekend(pName, wcWk), 0);
      // For weekends between wildcard and last weekend
      const newPtsBeforeLast = (u.squad || []).reduce((sum, pName) => {
        const pd = playerPointsMap[pName];
        if (!pd) return sum;
        return sum + pd.matchDetails
          .filter(md => md.counted && md.weekendKey >= wcWk && md.weekendKey !== lastWk)
          .reduce((s, md) => s + md.matchTotal, 0);
      }, 0);
      pts = oldPts + newPtsBeforeLast;
    } else {
      pts = (u.squad || []).reduce((sum, pName) => sum + getPlayerPtsExcludingWeekend(pName, lastWk), 0);
    }
    return { user: u.user, totalPoints: pts };
  }).sort((a, b) => b.totalPoints - a.totalPoints);

  const prevRankMap = {};
  previous.forEach((u, i) => { prevRankMap[u.user] = i + 1; });

  // Sort current and compute movement
  current.sort((a, b) => b.totalPoints - a.totalPoints);
  current.forEach((u, i) => {
    const currentRank = i + 1;
    const prevRank = prevRankMap[u.user] || currentRank;
    u.movement = prevRank - currentRank; // positive = moved up
  });

  return current;
}

function getWeekendWinners(lb) {
  const lastWk = getLastWeekendKey();
  if (!lastWk) return [];
  return [...lb].sort((a, b) => b.lastWeekendPts - a.lastWeekendPts).slice(0, 3);
}

function getTopPicks() {
  const counts = {};
  for (const u of squads) {
    if (!u.squad) continue;
    for (const pName of u.squad) {
      counts[pName] = (counts[pName] || 0) + 1;
    }
  }
  return Object.entries(counts)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 3)
    .map(([name, count]) => ({ name, count }));
}

  const lb = calculateLeaderboard();

    .map(([name, pd]) => ({name, pts: pd.totalPoints}))

  html += '<div class="mini-board"><h4>MVP Klassement</h4>';
  mvps.forEach((p, i) => {
    html += `<div class="mini-entry"><span class="mini-medal">${medals[i]}</span><span class="mini-name">${p.name}</span><span class="mini-value">${p.pts}</span></div>`;
  });
  html += '</div>';

    html += `<div class="mini-entry"><span class="mini-medal">${medals[i]}</span><span class="mini-name">${p.name}</span><span class="mini-value">${p.count}x</span></div>`;
  });
  html += '</div></div>';

  html += '<div class="section-label">Leaderboard</div>';
  const showMovement = getAllWeekendKeys().length > 1;
  lb.forEach((u, i) => {
    const rank = i + 1;
    const cls = rank <= 3 ? ` top-${rank}` : '';
    const avatar = u.avatar ? `<img class="avatar" src="${u.avatar}" onerror="this.style.display='none'">` : '';
    const delta = u.lastWeekendPts > 0 ? `<span class="user-delta">+${u.lastWeekendPts}</span>` : '';
    let moveHtml = '';
    if (showMovement) {
      if (u.movement > 0) moveHtml = `<span class="user-movement up">&#9650;${u.movement}</span>`;
      else if (u.movement < 0) moveHtml = `<span class="user-movement down">&#9660;${Math.abs(u.movement)}</span>`;
      else moveHtml = `<span class="user-movement same">=</span>`;
    }
    html += `
      <div class="leaderboard-row${cls}" onclick="showSquad('${u.user.replace(/'/g, "\\'")}')">

        ${avatar}

        <div class="user-points">${u.totalPoints}${delta}</div>

  });
  app.innerHTML = html;
}

function renderSquad(app) {
  const user = squads.find(u => u.user === currentUser);
  if (!user) return;

  const squadWithPts = user.squad.map(pName => {
    const player = players.find(p => p.name === pName);
    return {
      name: pName,
      price: player?.price || 0,
      points: playerPointsMap[pName]?.totalPoints || 0,
    };
  }).sort((a, b) => b.points - a.points);

  const totalPts = squadWithPts.reduce((s, p) => s + p.points, 0);

  const userObj = squads.find(u => u.user === currentUser);
  const avatarUrl = userObj?.avatar || '';
  const avatarImg = avatarUrl ? `<img class="avatar-large" src="${avatarUrl}" onerror="this.style.display='none'">` : '';

  // Current rank (matches the leaderboard order, including wildcard logic)
  const lb = calculateLeaderboard();
  const rankIdx = lb.findIndex(e => e.user === currentUser);
  const rankPrefix = rankIdx >= 0 ? `<span class="squad-header-rank">#${rankIdx + 1}</span> ` : '';

  // Rank timeline — one pill per weekend played, with delta vs previous weekend.
  const rankHist = getUserRankPerWeekend(currentUser);
  const MONTHS_NL_SHORT = ['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
  let timelineHtml = '';
  if (rankHist.length >= 1) {
    const pills = rankHist.map((h, i) => {
      const [, m, d] = h.weekendKey.split('-').map(Number);
      const dateLabel = `${d} ${MONTHS_NL_SHORT[m - 1]}`;
      let delta = '<span class="rank-pill-delta delta-flat">·</span>';
      if (i > 0) {
        const diff = rankHist[i - 1].rank - h.rank; // positive = moved up
        if (diff > 0) delta = `<span class="rank-pill-delta delta-up">▲${diff}</span>`;
        else if (diff < 0) delta = `<span class="rank-pill-delta delta-down">▼${-diff}</span>`;
        else delta = '<span class="rank-pill-delta delta-flat">–</span>';
      }
      return `<div class="rank-pill">
        <span class="rank-pill-date">${dateLabel}</span>
        <span class="rank-pill-rank">#${h.rank}</span>
        ${delta}
      </div>`;
    }).join('');
    timelineHtml = `<div class="rank-timeline">
      <div class="rank-timeline-label">Klassement verloop</div>
      ${pills}
    </div>`;
  }

  let html = `
    <div class="squad-header">
      ${avatarImg}
      <h2>${rankPrefix}${currentUser}</h2>
      <div class="total">${totalPts} <span>punten</span></div>
    </div>
    ${timelineHtml}
    <div class="section-label">Squad</div>`;

  // Calculate points correctly for wildcard users
  if (user.wildcardUsed && user.wildcardWeekendKey) {
    const wcWk = user.wildcardWeekendKey;
    for (const p of squadWithPts) {
      // New squad players: only count points from wildcard weekend onwards
      p.points = getPlayerPointsFromWeekend(p.name, wcWk);
    }
  }
  squadWithPts.sort((a, b) => b.points - a.points);

  for (const p of squadWithPts) {
    html += `
      <div class="player-row" onclick="showBreakdown('${p.name.replace(/'/g, "\\'")}')">
        <div class="player-name">${p.name}</div>
        <div class="player-price">&euro;${p.price}</div>
        <div class="player-points">${p.points}</div>
      </div>`;
  }

  // Show substituted-out players if wildcard was used
  if (user.wildcardUsed && user.oldSquad) {
    const removedPlayers = user.oldSquad.filter(name => !user.squad.includes(name));
    if (removedPlayers.length > 0) {
      const wcWk = user.wildcardWeekendKey;
      const subbed = removedPlayers.map(name => {
        const player = players.find(p => p.name === name);
        const frozenPts = getPlayerPointsUpToWeekend(name, wcWk);
        return { name, price: player?.price || 0, points: frozenPts };
      }).sort((a, b) => b.points - a.points);

      html += '<div class="section-label" style="margin-top:16px;color:#f87171">Gewisseld (punten bevroren)</div>';
      for (const p of subbed) {
        html += `
          <div class="player-row" style="opacity:0.5" onclick="showBreakdown('${p.name.replace(/'/g, "\\'")}')">
            <div class="player-name">${p.name}</div>
            <div class="player-price">&euro;${p.price}</div>
            <div class="player-points">${p.points}</div>
          </div>`;
      }
    }
  }

  // Wildcard button — only for own squad
  const loggedUser = getLoggedInUser();
  if (loggedUser && loggedUser.user === currentUser) {
    const alreadyUsed = wildcardData.some(wc => wc.email === loggedUser.email.toLowerCase());
    if (alreadyUsed) {
      html += '<div class="wildcard-used">Wildcard al gebruikt</div>';
    } else {
      const dow = new Date().getDay(); // 0=Sun, 1=Mon, 2=Tue, ..., 5=Fri, 6=Sat
      const isWildcardWindow = dow >= 2 && dow <= 5; // Tue-Fri
      if (isWildcardWindow) {
        html += '<button class="wildcard-btn" onclick="showWildcardEditor()">Wildcard gebruiken</button>';
      } else {
        html += '<div class="wildcard-used">Wildcard beschikbaar van dinsdag t/m vrijdag</div>';
      }
    }
  }

  app.innerHTML = html;
}

function isSinglesType(type) {
  return /^(HE|DE)\d/i.test(type);
}
function isDoublesType(type) {
  return /^(HD|DD|GD)\d/i.test(type);
}

function drawRatingChart(canvasId, playerName, matchDetails, mode) {
  // Try rating_history.json first (full history), fall back to match data.
  // Chart shows the trailing 52 weeks with a time-linear X axis.
  const histKey = mode === 'doubles' ? 'doubles' : 'singles';
  const histData = ratingHistory[playerName]?.[histKey];
  const allPoints = [];

  if (histData && histData.length > 0) {
    for (const h of histData) {
      const d = parseDate(h.date);
      if (!d) continue;
      allPoints.push({ date: d, rating: h.rating, won: h.won, dateStr: h.date });
    }
  } else {
    // Fallback: extract from match details
    const filterFn = mode === 'doubles' ? isDoublesType : isSinglesType;
    for (const md of matchDetails) {
      const d = parseDate(md.date);
      if (!d) continue;
      for (const p of md.partijen) {
        if (!filterFn(p.type)) continue;
        const rating = p.myRating;
        if (rating == null) continue;
        allPoints.push({ date: d, rating, won: p.won, dateStr: md.date });
      }
    }
  }
  if (allPoints.length < 2) return;
  allPoints.sort((a, b) => a.date - b.date);

  // Clip to the last 52 weeks, anchored to today
  const now = new Date();
  const endTime = now.getTime();
  const startTime = endTime - 52 * 7 * 24 * 60 * 60 * 1000;
  let points = allPoints.filter(p => p.date.getTime() >= startTime);
  // If clipping leaves fewer than 2 points, keep the most recent 2+ so the chart still renders.
  if (points.length < 2) points = allPoints.slice(-Math.max(2, points.length));

  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;

  const pad = { top: 16, right: 12, bottom: 28, left: 40 };
  const cW = W - pad.left - pad.right;
  const cH = H - pad.top - pad.bottom;

  // Rating axis is inverted (lower = better)
  const ratings = points.map(p => p.rating);
  const minR = Math.floor(Math.min(...ratings) * 2) / 2;
  const maxR = Math.ceil(Math.max(...ratings) * 2) / 2;
  const rRange = maxR - minR || 1;
  const n = points.length;

  // Evenly spaced X by index (so dense match weeks don't overlap),
  // but data is already clipped to the trailing 52 weeks.
  const xi = i => pad.left + (n === 1 ? cW / 2 : (i / (n - 1)) * cW);
  const y = r => pad.top + ((r - minR) / rRange) * cH; // lower rating = top

  // Grid lines & Y labels
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  ctx.fillStyle = '#666';
  ctx.font = '11px -apple-system, sans-serif';
  ctx.textAlign = 'right';
  const step = rRange <= 2 ? 0.5 : 1;
  for (let r = minR; r <= maxR + 0.01; r += step) {
    const yy = y(r);
    ctx.beginPath(); ctx.moveTo(pad.left, yy); ctx.lineTo(W - pad.right, yy); ctx.stroke();
    ctx.fillText(r.toFixed(1), pad.left - 6, yy + 4);
  }

  // X labels — label the first point whose month differs from the previous one,
  // so each label sits on a real data point at the month it represents.
  const MONTHS_NL = ['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
  ctx.textAlign = 'center';
  ctx.fillStyle = '#666';
  const monthStartIdx = [0];
  for (let i = 1; i < n; i++) {
    if (points[i].date.getMonth() !== points[i - 1].date.getMonth()) monthStartIdx.push(i);
  }
  // Thin out to avoid crowding on narrow canvases.
  const stride = Math.max(1, Math.ceil(monthStartIdx.length / 6));
  for (let k = 0; k < monthStartIdx.length; k += stride) {
    const idx = monthStartIdx[k];
    const label = MONTHS_NL[points[idx].date.getMonth()];
    ctx.fillText(label, xi(idx), H - 4);
  }

  // Line
  ctx.beginPath();
  ctx.strokeStyle = 'rgba(192, 132, 252, 0.9)';
  ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  for (let i = 0; i < n; i++) {
    const px = xi(i), py = y(points[i].rating);
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.stroke();

  // Dots — green for win, red for loss
  for (let i = 0; i < n; i++) {
    const px = xi(i), py = y(points[i].rating);
    ctx.beginPath();
    ctx.arc(px, py, 4, 0, Math.PI * 2);
    ctx.fillStyle = points[i].won ? '#4ade80' : '#f87171';
    ctx.fill();
    ctx.strokeStyle = '#1a1a2e';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Best rating indicator
  let bestIdx = 0;
  for (let i = 1; i < n; i++) { if (points[i].rating < points[bestIdx].rating) bestIdx = i; }
  const bx = xi(bestIdx), by = y(points[bestIdx].rating);
  ctx.beginPath();
  ctx.arc(bx, by, 6, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(192, 132, 252, 0.4)';
  ctx.fill();
  ctx.strokeStyle = '#c084fc';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = '#c084fc';
  ctx.font = 'bold 10px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(points[bestIdx].rating.toFixed(2), bx, by - 10);
}

function renderBreakdown(app) {
  const pd = playerPointsMap[currentPlayer];
  if (!pd) {
    app.innerHTML = '<div class="no-matches">Geen data gevonden</div>';
    return;
  }

  let html = `
    <div class="breakdown-header">
      <h2>${currentPlayer}</h2>
      <div class="total">${pd.totalPoints} punten</div>
    </div>`;

  // Rating chart with singles/doubles tabs
  const hist = ratingHistory[currentPlayer];
  const hasSinglesRatings = (hist?.singles?.length >= 2) || pd.matchDetails.some(md => md.partijen?.some(p => isSinglesType(p.type) && p.myRating != null));
  const hasDoublesRatings = (hist?.doubles?.length >= 2) || pd.matchDetails.some(md => md.partijen?.some(p => isDoublesType(p.type) && p.myRating != null));
  const hasRatings = hasSinglesRatings || hasDoublesRatings;
  const defaultTab = hasSinglesRatings ? 'singles' : 'doubles';
  if (hasRatings) {
    html += `<div class="rating-chart-container">
      <div class="rating-chart-header">
        <h3>Rating verloop (52 weken)</h3>
        <div class="rating-tabs">
          ${hasSinglesRatings ? `<button class="rating-tab${defaultTab === 'singles' ? ' active' : ''}" data-mode="singles">Enkel</button>` : ''}
          ${hasDoublesRatings ? `<button class="rating-tab${defaultTab === 'doubles' ? ' active' : ''}" data-mode="doubles">Dubbel</button>` : ''}
        </div>
      </div>
      <canvas id="ratingChart"></canvas>
    </div>`;
  }

  if (pd.matchDetails.length === 0) {
    html += '<div class="no-matches">Nog geen wedstrijden gespeeld</div>';
  }

  // Group by weekend
  const byWeekend = {};
  for (const md of pd.matchDetails) {
    const key = md.weekendKey || md.date || 'unknown';
    if (!byWeekend[key]) byWeekend[key] = [];
    byWeekend[key].push(md);
  }

  for (const [wk, wkMatches] of Object.entries(byWeekend)) {
    // Weekend label with date
    const dateStr = wkMatches[0]?.date || '';
    const hasMultiple = wkMatches.length > 1;
    if (hasMultiple) {
      html += `<div class="weekend-label">Weekend ${dateStr}${hasMultiple ? ' — eerste speeldag telt' : ''}</div>`;
    }

    for (const md of wkMatches) {
      const homeIsTam = md.homeTeam.startsWith('TAM');
      const homeName = homeIsTam ? `<span class="tam">${md.homeTeam}</span>` : md.homeTeam;
      const awayName = md.awayTeam.startsWith('TAM') ? `<span class="tam">${md.awayTeam}</span>` : md.awayTeam;
      const badgeCls = md.teamWinBonus ? 'win' : 'loss';
      const dimmed = md.counted === false ? ' dimmed' : '';

      html += `<div class="match-card${dimmed}">
        <div class="match-card-header">
          <div class="match-teams">${homeName} - ${awayName}</div>
          <div class="match-score-badge ${badgeCls}">${md.teamScore}</div>
        </div>`;

      for (const p of md.partijen) {
        const firstName = n => n.split(' ')[0];
        const oppNames = p.opponent.players?.map(firstName).join(', ') || '?';
        const myName = firstName(currentPlayer);
        const partnerStr = p.partner.length > 0 ? ` + ${p.partner.map(firstName).join(', ')}` : '';
        const detail = `${myName}${partnerStr} vs ${oppNames}`;
        const ptsCls = p.reason;
        const ptsLabel = p.points > 0 ? `+${p.points}` : '0';

        // Show set scores from TAM player's perspective
        // p.sets is always [home, away] — flip if player was on away side
        const isAway = p.opponent.team && md.homeTeam === p.opponent.team;
        const displaySets = p.sets?.map(s =>
          isAway ? `${s[1]}-${s[0]}` : `${s[0]}-${s[1]}`
        ).join(' ') || 'WO';

        // Rating display — show average for doubles
        const myR = p.myRatings?.filter(r => r != null) || [];
        const oppR = p.oppRatings?.filter(r => r != null) || [];
        let ratingStr = '';
        if (myR.length && oppR.length) {
          const myAvg = (myR.reduce((a, b) => a + b, 0) / myR.length).toFixed(4);
          const oppAvg = (oppR.reduce((a, b) => a + b, 0) / oppR.length).toFixed(4);
          ratingStr = `${myAvg} vs ${oppAvg}`;
        }

        // Breakdown detail
        const bd = p.breakdown || {};
        const bonusTags = [];
        if (bd.straightSets) bonusTags.push('straight sets +15');
        if (bd.comeback) bonusTags.push('comeback +10');
        if (bd.upset) bonusTags.push('upset +10');
        const bonusStr = bonusTags.length ? `<div class="partij-bonuses">${bonusTags.join(' · ')}</div>` : '';

        html += `
          <div class="partij-row">
            <div class="partij-type">${p.type}</div>
            <div class="partij-detail">${detail}${ratingStr ? `<div class="partij-rating">${ratingStr}</div>` : ''}${bonusStr}</div>
            <div class="partij-sets">${displaySets}</div>
            <div class="partij-points ${ptsCls}">+${p.points}</div>
          </div>`;
      }

      if (md.teamWinBonus) {
        html += '<div class="team-bonus">Team matchday win +40</div>';
      }

      html += `
        <div class="match-total">
          <span>${md.date || md.round || 'Wedstrijd'}</span>
          <span class="pts">${md.counted === false ? '' : '+'}${md.matchTotal}</span>
        </div>
      </div>`;
    }
  }

  app.innerHTML = html;
  if (hasRatings) {
    const tabs = app.querySelectorAll('.rating-tab');
    const drawChart = (mode) => drawRatingChart('ratingChart', currentPlayer, pd.matchDetails, mode);
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        drawChart(tab.dataset.mode);
      });
    });
    requestAnimationFrame(() => drawChart(defaultTab));
  }
}

function toggleDrawer() {
  const existing = document.getElementById('mobileDrawer');
  if (existing) { existing.remove(); return; }

  const weekendWinners = getWeekendWinners(calculateLeaderboard());
  const topPicks = getTopPicks();
  const medals = ['🥇', '🥈', '🥉'];

  let html = '<div class="mini-board"><h4>Weekend winnaars</h4>';
  if (weekendWinners.length && weekendWinners[0].lastWeekendPts > 0) {
    weekendWinners.forEach((u, i) => {
      html += `<div class="mini-entry"><span class="mini-medal">${medals[i]}</span><span class="mini-name">${u.user}</span><span class="mini-value">+${u.lastWeekendPts}</span></div>`;
    });
  } else {
    html += '<div style="color:#555;font-size:12px">Nog geen data</div>';
  }
  // MVP
  const mvps = Object.entries(playerPointsMap)
    .map(([name, pd]) => ({name, pts: pd.totalPoints}))
    .filter(p => p.pts > 0)
    .sort((a, b) => b.pts - a.pts)
    .slice(0, 3);
  html += '</div><div class="mini-board" style="margin-top:12px"><h4>MVP Klassement</h4>';
  mvps.forEach((p, i) => {
    html += `<div class="mini-entry"><span class="mini-medal">${medals[i]}</span><span class="mini-name">${p.name}</span><span class="mini-value">${p.pts}</span></div>`;
  });
  html += '</div><div class="mini-board" style="margin-top:12px"><h4>Popular picks</h4>';
  topPicks.forEach((p, i) => {
    html += `<div class="mini-entry"><span class="mini-medal">${medals[i]}</span><span class="mini-name">${p.name}</span><span class="mini-value">${p.count}x</span></div>`;
  });
  html += '</div>';

  const drawer = document.createElement('div');
  drawer.id = 'mobileDrawer';
  drawer.className = 'mobile-drawer open';
  drawer.innerHTML = `<div class="mobile-drawer-overlay" onclick="toggleDrawer()"></div><div class="mobile-drawer-content"><button class="mobile-drawer-close" onclick="toggleDrawer()">✕</button>${html}</div>`;

}

// === Login Modal ===
function showLoginModal() {
  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>Inloggen</h3>
        <div id="loginStep1">
          <input type="email" id="loginEmail" placeholder="E-mailadres" autocomplete="email">
          <button class="modal-btn" onclick="sendCode()">Code versturen</button>
        </div>
        <div id="loginStep2" style="display:none">
          <p style="color:#888;font-size:13px;margin-bottom:12px;text-align:center">Code verstuurd naar je e-mail</p>
          <input type="text" id="loginCode" placeholder="6-cijferige code" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
          <button class="modal-btn" onclick="verifyCode()">Verifiëren</button>
        </div>
        <div id="loginError" class="modal-error"></div>
      </div>
    </div>`;
}

function closeModal() {
  document.getElementById('modal-root').innerHTML = '';
}

async function sendCode() {
  const email = document.getElementById('loginEmail').value.toLowerCase().trim();
  const error = document.getElementById('loginError');
  if (!email) { error.textContent = 'Vul je e-mailadres in'; return; }
  const knownEmails = squads.map(u => u.email?.toLowerCase()).filter(Boolean);
  if (!knownEmails.includes(email)) { error.textContent = 'Dit e-mailadres is niet bekend'; return; }
  error.textContent = '';
  const btn = document.querySelector('#loginStep1 .modal-btn');
  btn.disabled = true; btn.textContent = 'Versturen...';
  try {
    const res = await fetch(WORKER_URL + '/send-code', {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({email})
    });
    const data = await res.json();
    if (data.ok) {
      document.getElementById('loginStep1').style.display = 'none';
      document.getElementById('loginStep2').style.display = '';
    } else { error.textContent = data.error || 'Fout bij versturen'; btn.disabled = false; btn.textContent = 'Code versturen'; }
  } catch(e) { error.textContent = 'Netwerkfout'; btn.disabled = false; btn.textContent = 'Code versturen'; }
}

async function verifyCode() {
  const email = document.getElementById('loginEmail').value.toLowerCase().trim();
  const code = document.getElementById('loginCode').value.trim();
  const error = document.getElementById('loginError');
  if (code.length !== 6) { error.textContent = 'Voer de 6-cijferige code in'; return; }
  const btn = document.querySelector('#loginStep2 .modal-btn');
  btn.disabled = true; btn.textContent = 'Verifiëren...';
  try {
    const res = await fetch(WORKER_URL + '/verify-code', {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({email, code})
    });
    const data = await res.json();
    if (data.ok) {
      localStorage.setItem('tamp_auth', 'ok');
      localStorage.setItem('tamp_email', email);
      closeModal();
      render();
    } else { error.textContent = data.error || 'Ongeldige code'; btn.disabled = false; btn.textContent = 'Verifiëren'; }
  } catch(e) { error.textContent = 'Netwerkfout'; btn.disabled = false; btn.textContent = 'Verifiëren'; }
}

// === Wildcard Editor ===
let wcSelected = [];
let wcSearch = '';
let wcPriceFilter = null;

function showWildcardEditor() {
  const user = getLoggedInUser();
  if (!user) return;
  wcSelected = [...(user.squad || [])];
  wcSearch = '';
  wcPriceFilter = null;
  currentView = 'wildcard';
  render();
  window.scrollTo(0, 0);
}

function renderWildcardEditor(app) {
  const totalCost = wcSelected.reduce((s, name) => {
    const p = players.find(x => x.name === name);
    return s + (p?.price || 0);
  }, 0);
  const overBudget = totalCost > BUDGET_MAX;
  const canConfirm = wcSelected.length === 8 && !overBudget;

  let html = `
    <div class="squad-header">
      <h3 style="color:#fff">Nieuwe squad samenstellen</h3>
      <div class="editor-budget ${overBudget ? 'over' : 'ok'}">&euro;${totalCost} / &euro;${BUDGET_MAX}</div>
      <div style="color:#888;font-size:12px">${wcSelected.length}/8 spelers geselecteerd</div>
    </div>
    <div class="section-label">Geselecteerd</div>`;

  for (const name of wcSelected) {
    const p = players.find(x => x.name === name);
    html += `
      <div class="editor-player selected" onclick="wcToggle('${name.replace(/'/g,"\\'")}')">
        <div class="ep-check">✓</div>
        <div class="ep-name">${name}</div>
        <div class="ep-price">&euro;${p?.price || '?'}</div>
      </div>`;
  }

  html += `
    <div class="section-label">Beschikbare spelers</div>
    <input class="editor-search" type="text" placeholder="Zoek speler..." value="${wcSearch}" oninput="wcSearch=this.value;renderWildcardEditor(document.getElementById('app'))">
    <div class="editor-filters">
      <span class="filter-chip ${wcPriceFilter===null?'active':''}" onclick="wcPriceFilter=null;renderWildcardEditor(document.getElementById('app'))">Alle</span>
      <span class="filter-chip ${wcPriceFilter===75?'active':''}" onclick="wcPriceFilter=75;renderWildcardEditor(document.getElementById('app'))">&euro;75</span>
      <span class="filter-chip ${wcPriceFilter===100?'active':''}" onclick="wcPriceFilter=100;renderWildcardEditor(document.getElementById('app'))">&euro;100</span>
      <span class="filter-chip ${wcPriceFilter===125?'active':''}" onclick="wcPriceFilter=125;renderWildcardEditor(document.getElementById('app'))">&euro;125</span>
      <span class="filter-chip ${wcPriceFilter===150?'active':''}" onclick="wcPriceFilter=150;renderWildcardEditor(document.getElementById('app'))">&euro;150</span>
    </div>`;

  const available = players
    .filter(p => {
      if (wcSelected.includes(p.name)) return false;
      if (wcSearch && !p.name.toLowerCase().includes(wcSearch.toLowerCase())) return false;
      if (wcPriceFilter !== null && p.price !== wcPriceFilter) return false;
      return true;
    })
    .sort((a, b) => a.name.localeCompare(b.name));

  for (const p of available) {
    const full = wcSelected.length >= 8;
    html += `
      <div class="editor-player${full ? ' disabled' : ''}" onclick="wcToggle('${p.name.replace(/'/g,"\\'")}')">
        <div class="ep-check"></div>
        <div class="ep-name">${p.name}</div>
        <div class="ep-price">&euro;${p.price}</div>
      </div>`;
  }

  html += `
    <div class="confirm-bar">
      <button class="cancel" onclick="currentView='squad';render()">Annuleren</button>
      <button class="confirm" ${canConfirm ? '' : 'disabled'} onclick="confirmWildcard()">Bevestigen</button>
    </div>`;

  app.innerHTML = html;
}

function wcToggle(name) {
  const idx = wcSelected.indexOf(name);
  if (idx >= 0) {
    wcSelected.splice(idx, 1);
  } else if (wcSelected.length < 8) {
    wcSelected.push(name);
  }
  renderWildcardEditor(document.getElementById('app'));
}

async function confirmWildcard() {
  const totalCost = wcSelected.reduce((s, name) => {
    const p = players.find(x => x.name === name);
    return s + (p?.price || 0);
  }, 0);
  if (wcSelected.length !== 8 || totalCost > BUDGET_MAX) return;

  const email = getLoggedInEmail();
  if (!confirm('Weet je zeker dat je je wildcard wilt gebruiken? Dit kan maar 1 keer!')) return;

  try {
    const user = getLoggedInUser();
    const oldSquad = [...(user?.squad || [])];
    const res = await fetch(WORKER_URL + '/use-wildcard', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email, newSquad: wcSelected, oldSquad })
    });
    const data = await res.json();
    if (data.ok) {
      // Apply locally
      const wcEntry = { email: email.toLowerCase(), oldSquad, newSquad: [...wcSelected], timestamp: new Date().toISOString() };
      wildcardData.push(wcEntry);
      if (user) {
        user.oldSquad = oldSquad;
        user.squad = [...wcSelected];
        user.wildcardUsed = true;
        user.wildcardDate = wcEntry.timestamp;
        user.wildcardWeekendKey = getNextSaturdayKey(wcEntry.timestamp);
      }
      processMatches();
      currentView = 'squad';
      currentUser = user.user;
      render();
      window.scrollTo(0, 0);
    } else {
      alert(data.error || 'Fout bij opslaan');
    }
  } catch(e) { alert('Netwerkfout'); }
}

// === Navigation ===
function goBack() {
  if (currentView === 'wildcard') {
    currentView = 'squad';
  } else if (currentView === 'breakdown') {
    currentView = 'squad';
  } else if (currentView === 'rules') {
    currentView = 'leaderboard';
  } else {
    currentView = 'leaderboard';
    currentUser = null;
  }
  render();
  window.scrollTo(0, 0);
}

window.addEventListener('popstate', (e) => {
  if (e.state) {
    currentView = e.state.view;
    currentUser = e.state.user;
    currentPlayer = e.state.player;
  } else {
    currentView = 'leaderboard';
    currentUser = null;
    currentPlayer = null;
  }
  render();
});

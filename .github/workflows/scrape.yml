name: Scrape KNLTB matches

on:
  schedule:
    - cron: '0 7 * * *'   # 9am CET (7am UTC)
    - cron: '0 19 * * *'  # 9pm CET (7pm UTC)
  workflow_dispatch:       # manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        env:
          KNLTB_USERNAME: ${{ secrets.KNLTB_USERNAME }}
          KNLTB_PASSWORD: ${{ secrets.KNLTB_PASSWORD }}
        run: python run_scrape.py

      - name: Commit updated data
        run: |
          git config user.name "TAMpionship Bot"
          git config user.email "actions@github.com"
          git add knltb_matches.json player_ratings.json rating_history.json
          git diff --staged --quiet || git commit -m "Update match data $(date -u '+%Y-%m-%d %H:%M')"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
